server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-placement-mentor

  data:
    mongodb:
      uri: mongodb+srv://aimentor:Autogenerate@cluster0.bnd4gs3.mongodb.net/ai_placement_mentor?retryWrites=true&w=majority&appName=Cluster0
      auto-index-creation: false

  servlet:
    multipart:
      enabled: true 
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-minimum-32-chars}
    expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

  gemini:
    api-key: ${GROQ_API_KEY:}
    base-url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.3-70b-versatile
    max-retries: 3
    timeout: 30

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.aimentor: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  packages-to-scan: com.aimentor.controller
  show-actuator: false
